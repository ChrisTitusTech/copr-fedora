name: COPR

on:
  pull_request:
    paths:
      - ".copr/**"
      - ".github/workflows/copr.yml"
      - "packages/**"
      - "scripts/**"
      - "templates/**"
      - "tests/**"
  push:
    branches: [main]
    paths:
      - ".copr/**"
      - ".github/workflows/copr.yml"
      - "packages/**"
      - "scripts/**"
  workflow_dispatch:
    inputs:
      package:
        description: "Package name to publish, or all"
        required: true
        default: all
        type: string

permissions:
  contents: read

jobs:
  validate:
    name: Validate packages
    runs-on: ubuntu-latest
    container: fedora:44
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install validation tools
        run: dnf -y install git make python3 rpm-build rpmdevtools rpmlint

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v

      - name: Validate package definitions
        run: python3 scripts/copr_automation.py validate --all

  publish:
    name: Publish to COPR
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 360
    container: fedora:44
    concurrency:
      group: copr-publish
      cancel-in-progress: false
    env:
      COPR_CONFIG: ${{ secrets.COPR_CONFIG }}
      COPR_OWNER: ${{ vars.COPR_OWNER }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install COPR client
        run: dnf -y install copr-cli git make python3 python3-copr rpm-build rpmdevtools

      - name: Publish packages
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          REQUESTED_PACKAGE: ${{ inputs.package }}
        run: |
          set -euo pipefail
          umask 077
          config_path="$(mktemp)"
          trap 'rm -f "$config_path"' EXIT
          printf '%s\n' "$COPR_CONFIG" > "$config_path"
          export COPR_CONFIG_PATH="$config_path"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "$REQUESTED_PACKAGE" == "all" ]]; then
              python3 scripts/copr_automation.py publish --all
            else
              python3 scripts/copr_automation.py publish --package "$REQUESTED_PACKAGE"
            fi
          else
            python3 scripts/copr_automation.py publish --changed-from "$BEFORE_SHA" --head "$HEAD_SHA"
          fi
